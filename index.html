<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, orientation=landscape">
    <title>阿噗向前冲 - 3D闯关</title>
    
    <script src="https://cdn.tailwindcss.com"></script>
    <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>

    <style>
        body { 
            margin: 0; padding: 0; background-color: #e0f2fe; overflow: hidden; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; 
            touch-action: none; 
            user-select: none;
            -webkit-user-select: none;
        }
        
        /* 带有 strict-lock 的 body 才会显示阻挡层 */
        @media screen and (orientation: portrait) {
            body.strict-lock #portrait-lock { display: flex !important; }
            body.strict-lock #app-container { display: none !important; }
        }
        #portrait-lock { display: none; }
        
        /* 隐藏滚动条但保留滚动功能 (适配答题界面) */
        .hide-scrollbar::-webkit-scrollbar { display: none; }
        .hide-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }

        /* 漫天飞舞的彩带动画 */
        @keyframes confetti-fall {
            0% { transform: translateY(-10vh) rotate(0deg) scale(1); opacity: 1; }
            100% { transform: translateY(110vh) rotate(720deg) scale(1.2); opacity: 0; }
        }

        /* 撞击路障的碎屏震动特效 */
        @keyframes crash-shake {
            0% { transform: translate(1px, 1px) rotate(0deg); }
            10% { transform: translate(-1px, -2px) rotate(-1deg); }
            20% { transform: translate(-3px, 0px) rotate(1deg); }
            30% { transform: translate(3px, 2px) rotate(0deg); }
            40% { transform: translate(1px, -1px) rotate(1deg); }
            50% { transform: translate(-1px, 2px) rotate(-1deg); }
            60% { transform: translate(-3px, 1px) rotate(0deg); }
            70% { transform: translate(3px, 1px) rotate(-1deg); }
            80% { transform: translate(-1px, -1px) rotate(1deg); }
            90% { transform: translate(1px, 2px) rotate(0deg); }
            100% { transform: translate(1px, -2px) rotate(-1deg); }
        }
        .crash-shake {
            animation: crash-shake 0.4s cubic-bezier(.36,.07,.19,.97) both;
        }
    </style>
</head>
<body class="strict-lock">
    <!-- 带有跳过功能的竖屏提示页面 -->
    <div id="portrait-lock" class="fixed inset-0 bg-sky-900 z-[9990] flex-col items-center justify-center text-white p-6 text-center">
        <svg class="w-20 h-20 sm:w-24 sm:h-24 mb-4 sm:mb-6 animate-[pulse_2s_infinite] text-sky-300" fill="none" stroke="currentColor" viewBox="0 0 24 24">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5" d="M12 18h.01M8 21h8a2 2 0 002-2V5a2 2 0 00-2-2H8a2 2 0 00-2 2v14a2 2 0 002 2z" transform="rotate(90 12 12)" />
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 4l16 16M4 20L20 4" class="opacity-30"/>
        </svg>
        <h2 class="text-2xl sm:text-3xl font-black mb-2 tracking-wider">建议横屏游玩</h2>
        <p class="text-sky-200 text-sm sm:text-base leading-relaxed mt-2">横屏拥有更宽广的视野体验<br/>但您也可以随时跳过</p>
        
        <div class="mt-6 sm:mt-8 flex flex-col gap-3 sm:gap-4 w-full max-w-[280px] mx-auto">
            <button onclick="unlockAndFullscreen()" class="w-full px-6 py-3 sm:py-4 bg-yellow-400 text-yellow-900 font-black rounded-full text-base sm:text-lg shadow-[0_4px_0_#b45309] active:translate-y-1 active:shadow-none transition-all">尝试强制横屏/全屏</button>
            <button onclick="unlockPortrait()" class="w-full px-6 py-3 sm:py-4 bg-sky-800 text-sky-200 font-bold rounded-full text-sm sm:text-base border-2 border-sky-600 active:bg-sky-700 transition-all">忽略，我要竖屏玩</button>
        </div>
    </div>

    <div id="app-container">
        <div id="root"></div>
    </div>

    <!-- 内联 JS 处理锁定逻辑 -->
    <script>
        async function unlockAndFullscreen() {
            document.body.classList.remove('strict-lock'); 
            try {
                const docEl = document.documentElement;
                if (docEl.requestFullscreen) { await docEl.requestFullscreen(); }
                else if (docEl.webkitRequestFullscreen) { await docEl.webkitRequestFullscreen(); }
                
                if (window.screen && window.screen.orientation && window.screen.orientation.lock) {
                    await window.screen.orientation.lock('landscape');
                }
            } catch (err) { 
                console.warn("浏览器或应用拦截了自动旋转", err); 
            }
        }

        function unlockPortrait() {
            document.body.classList.remove('strict-lock'); 
        }
    </script>

    <script type="text/babel">
        const { useState, useEffect, useRef, useCallback } = React;

        // === 原生 SVG 组件 ===
        const Trophy = ({ className, size = 24 }) => <svg className={className} width={size} height={size} xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M6 9H4.5a2.5 2.5 0 0 1 0-5H6"/><path d="M18 9h1.5a2.5 2.5 0 0 0 0-5H18"/><path d="M4 22h16"/><path d="M10 14.66V17c0 .55-.47.98-.97 1.21C7.85 18.75 7 20.24 7 22"/><path d="M14 14.66V17c0 .55.47.98.97 1.21C16.15 18.75 17 20.24 17 22"/><path d="M18 2H6v7c0 6 3 10 6 10s6-4 6-10V2z"/></svg>;
        const Timer = ({ className, size = 24 }) => <svg className={className} width={size} height={size} xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><line x1="10" y1="2" x2="14" y2="2"/><line x1="12" y1="14" x2="15" y2="11"/><circle cx="12" cy="14" r="8"/></svg>;
        const ChevronRight = ({ className, size = 24 }) => <svg className={className} width={size} height={size} xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><polyline points="9 18 15 12 9 6"/></svg>;
        const Loader2 = ({ className, size = 24 }) => <svg className={className} width={size} height={size} xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M21 12a9 9 0 1 1-6.219-8.56"/></svg>;
        const Play = ({ className, size = 24 }) => <svg className={className} width={size} height={size} xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><polygon points="5 3 19 12 5 21 5 3"/></svg>;
        const CheckCircle = ({ className, size = 24 }) => <svg className={className} width={size} height={size} xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M22 11.08V12a10 10 0 1 1-5.93-9.14"/><polyline points="22 4 12 14.01 9 11.01"/></svg>;
        const XCircle = ({ className, size = 24 }) => <svg className={className} width={size} height={size} xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><circle cx="12" cy="12" r="10"/><line x1="15" y1="9" x2="9" y2="15"/><line x1="9" y1="9" x2="15" y2="15"/></svg>;

        // === 游戏全局配置 ===
        const GRID_ROWS = 20; 
        const GRID_COLS = 6;  
        const HEX_RADIUS = 10; 
        const FALL_Y_THRESHOLD = -25; 

        const START_POS = { x: 0, y: 2.0, z: 50 }; 
        const QUIZ1_TRIGGER_Z = 18; 
        const QUIZ2_TRIGGER_Z = -380; 
        const QUIZ3_TRIGGER_Z = -770; 
        const STAGE3_WIN_Z = -3000; 

        // 皮肤配置
        const SKINS = [
            { id: 'classic', name: '海盐蓝', color: 0x0ea5e9, hex: '#0ea5e9' },
            { id: 'sakura', name: '樱花粉', color: 0xf472b6, hex: '#f472b6' },
            { id: 'golden', name: '柠檬黄', color: 0xfacc15, hex: '#facc15' },
            { id: 'ninja', name: '葡萄紫', color: 0xa855f7, hex: '#a855f7' }
        ];

        // === 图案与材质生成器 ===
        const createPieTexture = (color1, color2, slices = 16) => {
            const canvas = document.createElement('canvas');
            canvas.width = 512; canvas.height = 512;
            const ctx = canvas.getContext('2d');
            const cx = 256, cy = 256, r = 256;
            const sliceAngle = (Math.PI * 2) / slices;
            for (let i = 0; i < slices; i++) {
                ctx.beginPath();
                ctx.moveTo(cx, cy);
                ctx.arc(cx, cy, r, i * sliceAngle, (i + 1) * sliceAngle);
                ctx.fillStyle = i % 2 === 0 ? color1 : color2;
                ctx.fill();
            }
            return new window.THREE.CanvasTexture(canvas);
        };

        const createPattern = (color1, color2, type) => {
            const canvas = document.createElement('canvas');
            canvas.width = 512; canvas.height = 512;
            const ctx = canvas.getContext('2d');
            if (type === 'checker') {
                ctx.fillStyle = color1; ctx.fillRect(0, 0, 512, 512);
                ctx.fillStyle = color2;
                ctx.fillRect(0, 0, 256, 256); ctx.fillRect(256, 256, 256, 256);
            } else if (type === 'stripes') {
                ctx.fillStyle = color1; ctx.fillRect(0, 0, 512, 512);
                ctx.fillStyle = color2;
                ctx.lineWidth = 64;
                for(let i=-512; i<1024; i+=128) {
                    ctx.beginPath(); ctx.moveTo(i, 0); ctx.lineTo(i+512, 512); ctx.stroke();
                }
            } else if (type === 'dots') {
                ctx.fillStyle = color1; ctx.fillRect(0, 0, 512, 512);
                ctx.fillStyle = color2;
                for(let x=64; x<=512; x+=128) {
                    for(let y=64; y<=512; y+=128) {
                        ctx.beginPath(); ctx.arc(x, y, 32, 0, Math.PI*2); ctx.fill();
                    }
                }
            }
            const tex = new window.THREE.CanvasTexture(canvas);
            tex.wrapS = window.THREE.RepeatWrapping; tex.wrapT = window.THREE.RepeatWrapping;
            return tex;
        };

        const App = () => {
          const [gameState, setGameState] = useState('LOADING'); 
          const [fallReason, setFallReason] = useState('FALL'); 
          const [quizType, setQuizType] = useState('QUIZ_1'); 
          const [quizResult, setQuizResult] = useState(null);
          const [quizFeedback, setQuizFeedback] = useState(null); 
          const [timer, setTimer] = useState(10);
          const [countdown, setCountdown] = useState(3);
          const [currentStage, setCurrentStage] = useState(1);
          const [finalTime, setFinalTime] = useState(null); 
          
          const [activeSkin, setActiveSkin] = useState(SKINS[0]);
          const [difficulty, setDifficulty] = useState('NORMAL');
          const [showWechatPrompt, setShowWechatPrompt] = useState(false);
          const [isTouchDevice, setIsTouchDevice] = useState(false);
          
          const playerMaterialsRef = useRef(null);
          const difficultyRef = useRef('NORMAL');

          // 【自由摇杆状态】
          const [joystickState, setJoystickState] = useState({ active: false, originX: 0, originY: 0, posX: 0, posY: 0 });
          const joyRef = useRef({ active: false, id: null, ox: 0, oy: 0, px: 0, py: 0 });
          const joystickRef = useRef({ x: 0, y: 0 }); 

          const mountRef = useRef(null);
          const gameStateRef = useRef(gameState);
          
          const currentStageRef = useRef(currentStage);
          const quizResultRef = useRef(quizResult);
          
          const quiz1TriggeredRef = useRef(false); 
          const quiz2TriggeredRef = useRef(false); 
          const quiz3TriggeredRef = useRef(false); 
          const quiz1PassedRef = useRef(false); 
          const quiz2PassedRef = useRef(false); 
          const quiz3PassedRef = useRef(false); 

          const checkpointRef = useRef({ x: START_POS.x, y: START_POS.y, z: START_POS.z });
          
          const sceneRef = useRef(null);
          const cameraRef = useRef(null);
          const rendererRef = useRef(null);
          const playerRef = useRef(null);
          const hexesRef = useRef([]);
          const turntablesRef = useRef([]); 
          const shortcutRef = useRef(null); 
          const pendulumsRef = useRef([]); 
          const ballsRef = useRef([]); 
          const sceneryRef = useRef([]); 
          const slideObjectsRef = useRef(null); 
          const lastFireTimeRef = useRef(0); 
          const keysRef = useRef({});
          const requestRef = useRef();
          const resizeObserverRef = useRef(null);
          const startTimeRef = useRef(0);

          useEffect(() => { gameStateRef.current = gameState; }, [gameState]);
          useEffect(() => { currentStageRef.current = currentStage; }, [currentStage]);
          useEffect(() => { quizResultRef.current = quizResult; }, [quizResult]);

          // 检测微信环境与触屏设备
          useEffect(() => {
              const isWeChat = /MicroMessenger/i.test(navigator.userAgent);
              if (isWeChat) {
                  setShowWechatPrompt(true);
              }
              const hasTouch = 'ontouchstart' in window || navigator.maxTouchPoints > 0;
              setIsTouchDevice(hasTouch);
          }, []);

          useEffect(() => {
              if (playerMaterialsRef.current && playerMaterialsRef.current.mainColorMat) {
                  playerMaterialsRef.current.mainColorMat.color.setHex(activeSkin.color);
              }
          }, [activeSkin]);

          const applyDifficultyToHexes = useCallback((diff, hexesArray) => {
              let targetSafePct = 0.25;
              let targetTrapPct = 0.0;

              if (diff === 'EASY') { 
                  targetSafePct = 0.25; targetTrapPct = 0.0; 
              } else if (diff === 'NORMAL') { 
                  targetSafePct = 0.20; targetTrapPct = 0.10; 
              } else if (diff === 'HELL') { 
                  targetSafePct = 0.18; targetTrapPct = 0.20; 
              }

              const totalHexes = GRID_ROWS * GRID_COLS; 
              const targetSafeCount = Math.round(totalHexes * targetSafePct); 
              const targetTrapCount = Math.round(totalHexes * targetTrapPct);

              const safeSet = new Set();
              let currC = Math.floor(GRID_COLS / 2);
              
              for (let r = 0; r < GRID_ROWS; r++) {
                  safeSet.add(`hex-${r}-${currC}`);
                  if (Math.random() < 0.4) {
                      currC += Math.random() < 0.5 ? 1 : -1;
                      currC = Math.max(0, Math.min(GRID_COLS - 1, currC));
                  }
              }

              if (diff === 'HELL') {
                  const gapRow = Math.floor(Math.random() * 10) + 5; 
                  const hexToRemove = Array.from(safeSet).find(id => id.startsWith(`hex-${gapRow}-`));
                  if (hexToRemove) safeSet.delete(hexToRemove);
              }

              const allIds = hexesArray.map(h => h.id);
              while (safeSet.size < targetSafeCount) {
                  const existing = Array.from(safeSet);
                  const baseId = existing[Math.floor(Math.random() * existing.length)];
                  const parts = baseId.split('-');
                  const r = parseInt(parts[1]), c = parseInt(parts[2]);
                  
                  const neighbors = [
                      `hex-${r}-${c-1}`, `hex-${r}-${c+1}`,
                      `hex-${r-1}-${c}`, `hex-${r+1}-${c}`
                  ];
                  const validNeighbors = neighbors.filter(id => {
                      const p = id.split('-');
                      if (p.length !== 3) return false;
                      const nr = parseInt(p[1]), nc = parseInt(p[2]);
                      return nr >= 0 && nr < GRID_ROWS && nc >= 0 && nc < GRID_COLS && !safeSet.has(id);
                  });
                  
                  if (validNeighbors.length > 0) {
                      safeSet.add(validNeighbors[Math.floor(Math.random() * validNeighbors.length)]);
                  } else {
                      safeSet.add(allIds[Math.floor(Math.random() * allIds.length)]);
                  }
              }

              const trapSet = new Set();
              while (trapSet.size < targetTrapCount) {
                  trapSet.add(allIds[Math.floor(Math.random() * allIds.length)]);
              }

              hexesArray.forEach(hex => {
                  hex.isSafe = safeSet.has(hex.id);
                  hex.isTrap = trapSet.has(hex.id);
                  hex.isGlowing = false;
                  
                  if (hex.outerMat && hex.innerMat) {
                      hex.outerMat.color.setHex(0xffffff); 
                      hex.outerMat.emissive.setHex(0x000000); 
                      hex.outerMat.emissiveIntensity = 0;
                      hex.innerMat.emissive.setHex(0x000000); 
                      hex.innerMat.emissiveIntensity = 0;
                  }
              });
          }, []);

          const handleDifficultyChange = (diff) => {
              setDifficulty(diff); difficultyRef.current = diff;
              if (hexesRef.current && hexesRef.current.length > 0) applyDifficultyToHexes(diff, hexesRef.current);
          };

          // === 1. 初始化 3D 引擎 ===
          useEffect(() => {
            let isMounted = true;

            const initEngine = () => {
              const THREE = window.THREE;
              if (!THREE || !mountRef.current || !isMounted) return;

              const scene = new THREE.Scene();
              
              const skyCanvas = document.createElement('canvas');
              skyCanvas.width = 2; skyCanvas.height = 512;
              const sCtx = skyCanvas.getContext('2d');
              const skyGrad = sCtx.createLinearGradient(0, 0, 0, 512);
              skyGrad.addColorStop(0, '#38bdf8');   
              skyGrad.addColorStop(0.3, '#c084fc'); 
              skyGrad.addColorStop(0.7, '#f472b6'); 
              skyGrad.addColorStop(1, '#fde047');   
              sCtx.fillStyle = skyGrad; sCtx.fillRect(0,0,2,512);
              scene.background = new THREE.CanvasTexture(skyCanvas);
              
              scene.fog = new THREE.FogExp2(0xfbcfe8, 0.002);
              sceneRef.current = scene;

              let width = mountRef.current.clientWidth || window.innerWidth;
              let height = mountRef.current.clientHeight || window.innerHeight;

              const camera = new THREE.PerspectiveCamera(50, width / height, 0.1, 2000); 
              camera.position.set(0, 10, 70); 
              cameraRef.current = camera;

              const renderer = new THREE.WebGLRenderer({ antialias: true, alpha: true });
              renderer.setSize(width, height);
              renderer.shadowMap.enabled = true;
              renderer.shadowMap.type = THREE.PCFSoftShadowMap; 
              renderer.setPixelRatio(Math.min(window.devicePixelRatio || 1, 2));
              mountRef.current.appendChild(renderer.domElement);
              rendererRef.current = renderer;

              if (window.ResizeObserver) {
                resizeObserverRef.current = new ResizeObserver(entries => {
                  for (let entry of entries) {
                    if (!mountRef.current || !rendererRef.current || !cameraRef.current) return;
                    const w = entry.contentRect.width; const h = entry.contentRect.height;
                    if (w > 0 && h > 0) {
                      rendererRef.current.setSize(w, h); 
                      cameraRef.current.aspect = w / h; 
                      cameraRef.current.updateProjectionMatrix();
                    }
                  }
                });
                resizeObserverRef.current.observe(mountRef.current);
              }

              const ambientLight = new THREE.AmbientLight(0xffffff, 0.85);
              scene.add(ambientLight);
              const sunLight = new THREE.DirectionalLight(0xfffaeb, 0.7);
              sunLight.position.set(40, 80, 60); sunLight.castShadow = true;
              sunLight.shadow.mapSize.width = 2048; sunLight.shadow.mapSize.height = 2048;
              sunLight.shadow.camera.left = -120; sunLight.shadow.camera.right = 120;
              sunLight.shadow.camera.top = 120; sunLight.shadow.camera.bottom = -120;
              scene.add(sunLight);
              const fillLight = new THREE.DirectionalLight(0xfbcfe8, 0.4); 
              fillLight.position.set(-40, 30, -50);
              scene.add(fillLight);

              const groundCanvas = document.createElement('canvas');
              groundCanvas.width = 512; groundCanvas.height = 512;
              const gCtx = groundCanvas.getContext('2d');
              const gGrad = gCtx.createRadialGradient(256, 256, 0, 256, 256, 256);
              gGrad.addColorStop(0, '#fdf4ff'); gGrad.addColorStop(1, '#fbcfe8');
              gCtx.fillStyle = gGrad; gCtx.fillRect(0,0,512,512);
              const groundTex = new THREE.CanvasTexture(groundCanvas);
              groundTex.wrapS = groundTex.wrapT = THREE.RepeatWrapping; groundTex.repeat.set(50, 50);
              const groundMat = new THREE.MeshStandardMaterial({ map: groundTex, roughness: 0.8, opacity: 0.9, transparent: true });
              const ground = new THREE.Mesh(new THREE.PlaneGeometry(8000, 8000), groundMat);
              ground.rotation.x = -Math.PI/2; 
              ground.position.y = -250; 
              ground.receiveShadow = true;
              scene.add(ground);

              // === 构建阿噗模型 ===
              const playerGroup = new THREE.Group();
              const apuModel = new THREE.Group(); 
              const bodyGroup = new THREE.Group(); 
              
              const whiteMat = new THREE.MeshStandardMaterial({ color: 0xffffff, roughness: 0.3, metalness: 0.1 });
              const mainColorMat = new THREE.MeshStandardMaterial({ color: SKINS[0].color, roughness: 0.4, metalness: 0.1 });
              const blackMat = new THREE.MeshStandardMaterial({ color: 0x1e293b, roughness: 0.2 });
              const blushMat = new THREE.MeshStandardMaterial({ color: 0xfca5a5, roughness: 0.6 });
              playerMaterialsRef.current = { mainColorMat };

              const upperCyl = new THREE.Mesh(new THREE.CylinderGeometry(0.85, 0.85, 0.5, 32), whiteMat);
              upperCyl.position.y = 0.25; upperCyl.castShadow = true;
              const topDome = new THREE.Mesh(new THREE.SphereGeometry(0.85, 32, 32, 0, Math.PI * 2, 0, Math.PI / 2), whiteMat);
              topDome.position.y = 0.5; topDome.castShadow = true;
              const lowerCyl = new THREE.Mesh(new THREE.CylinderGeometry(0.85, 0.85, 0.6, 32), mainColorMat);
              lowerCyl.position.y = -0.3; lowerCyl.castShadow = true;
              const bottomDome = new THREE.Mesh(new THREE.SphereGeometry(0.85, 32, 32, 0, Math.PI * 2, 0, Math.PI / 2), mainColorMat);
              bottomDome.rotation.x = Math.PI; bottomDome.position.y = -0.6; bottomDome.castShadow = true;
              bodyGroup.add(upperCyl, topDome, lowerCyl, bottomDome);

              const tuftGroup = new THREE.Group();
              const tuft1 = new THREE.Mesh(new THREE.SphereGeometry(0.2, 16, 16), mainColorMat); tuft1.position.set(0.15, 0, 0);
              const tuft2 = new THREE.Mesh(new THREE.SphereGeometry(0.2, 16, 16), mainColorMat); tuft2.position.set(-0.15, 0, 0);
              const tuftBase = new THREE.Mesh(new THREE.ConeGeometry(0.22, 0.25, 16), mainColorMat); tuftBase.rotation.x = Math.PI; tuftBase.position.set(0, -0.05, 0);
              tuftGroup.add(tuft1, tuft2, tuftBase); tuftGroup.position.set(0, 1.45, 0);
              bodyGroup.add(tuftGroup);

              const eyeL = new THREE.Mesh(new THREE.SphereGeometry(0.1, 16, 16), blackMat); 
              eyeL.scale.set(1, 1.5, 0.1); eyeL.position.set(0.32, 0.35, 0.83);
              const eyeR = new THREE.Mesh(new THREE.SphereGeometry(0.1, 16, 16), blackMat);

              }

              const createBoostPad = () => {
                  const g = new THREE.Group();
                  const mat = new THREE.MeshStandardMaterial({color: 0xff3300, emissive: 0xff3300, emissiveIntensity: 2.5});
                  for(let i=0; i<3; i++) {
                      const bar = new THREE.Mesh(new THREE.BoxGeometry(3.5, 0.2, 0.8), mat);

              for (let t = 0.12; t < 0.75; t += 0.05) {

                  const offset = (Math.random() - 0.5) * 22; 
                  
                  const pt = slideCurve.getPointAt(t);

                  const heightRise = Math.pow(Math.abs(offset) / 20, 2.5) * 20;

                  let mesh;
                  if (type === 'boost') {
                      const finalPos = basePos.clone().add(normal.clone().multiplyScalar(heightRise + 0.3));

                      const m = new THREE.Matrix4();
                      m.makeBasis(binormal.clone().negate(), normal, tangent.clone().negate()); 
                      mesh.quaternion.setFromRotationMatrix(m);
                  } else if (type === 'roadblock') {
                      const finalPos = basePos.clone().add(normal.clone().multiplyScalar(heightRise + 0.3));
                      mesh = createRoadblock();

              scene.add(slideGroup);

              // === 游乐园梦幻远景 ===

              const rainbowColors = [0xef4444, 0xf97316, 0xfde047, 0x4ade80, 0x3b82f6, 0xa855f7];

                  const rope1 = new THREE.Mesh(new THREE.CylinderGeometry(0.1, 0.1, 5), ropeMat); rope1.position.set(1.5, -8, 1.5); rope1.rotation.z = Math.PI/8; rope1.rotation.x = -Math.PI/8;
                  const rope2 = rope1.clone(); rope2.position.set(-1.5, -8, 1.5); rope2.rotation.z = -Math.PI/8;

              addBalloon(-150, 80, 20, 0xf472b6); addBalloon(180, 100, -150, 0x38bdf8);

              const addFerrisWheel = (x, y, z, size, color) => {

                      const cabin = new THREE.Mesh(new THREE.CylinderGeometry(3, 3, 5, 16), cabinMat);

              addFerrisWheel(-220, 30, -200, 60, 0xf43f5e); addFerrisWheel(250, 40, -550, 70, 0x3b82f6);

              const toyColors = [0xf472b6, 0x38bdf8, 0xfacc15, 0xa855f7, 0x4ade80, 0xf87171];
              for(let i=0; i<150; i++) {

                  const toyGroup = new THREE.Group(); toyGroup.add(mesh); sceneryGroup.add(toyGroup);
                  sceneryRef.current.push({ 
                      mesh: toyGroup, type: 'toy',

                  });
              }

              scene.add(sceneryGroup);

              // === 动画循环 ===
              const animate = () => {
                requestRef.current = requestAnimationFrame(animate);
                
                if (gameStateRef.current === 'PLAYING' || gameStateRef.current === 'PLAYING_RESUME' || gameStateRef.current === 'WIN') {
                  updatePhysics(THREE);
                }

                const timeNow = Date.now();
                const blinkTime = timeNow * 0.008; 
                hexesRef.current.forEach(hex => {
                  if (hex.isGlowing && hex.outerMat && hex.innerMat) {
                    const isBright = Math.sin(blinkTime) > 0;
                    hex.outerMat.emissiveIntensity = isBright ? 1.0 : 0.4;
                    hex.innerMat.emissiveIntensity = isBright ? 0.8 : 0.2; 
                  }
                });

                const speedMult = difficultyRef.current === 'HELL' ? 1.5 : 1.0;

                turntablesRef.current.forEach(disk => { 
                    if(disk?.group?.rotation) disk.group.rotation.y -= disk.speed * speedMult; 
                });
                if (shortcutRef.current && shortcutRef.current.active) {
                   shortcutRef.current.layers.forEach(layer => { 
                       if(layer?.group?.rotation) layer.group.rotation.y -= layer.speed * speedMult; 
                   });
                }

                sceneryRef.current.forEach(item => {
                    if (!item || !item.mesh) return;
                    if (item.type === 'balloon' || item.type === 'cloud') {
                        if(item.mesh.position) item.mesh.position.y = item.origY + Math.sin(timeNow * item.speed + item.offset) * 10;
                    } else if (item.type === 'wheel') {
                        if(item.mesh.rotation) item.mesh.rotation.z -= item.speed;
                    } else if (item.type === 'cabin') {
                        if(item.mesh.rotation) item.mesh.rotation.z += 0.002; 
                    } else if (item.type === 'toy') {
                        if(item.mesh.rotation) {
                            item.mesh.rotation.x += item.rx;
                            item.mesh.rotation.y += item.ry;
                        }
                        if(item.mesh.position) item.mesh.position.y = item.origY + Math.sin(timeNow * item.speed + item.offset) * 20;
                    }
                });

                if (playerRef.current && playerRef.current.mesh) {
                  const playerCamYaw = playerRef.current.camYaw;
                  let camTarget, camPos;
                  let lerpSpeed = 0.15; 

                  const isPortrait = (window.innerWidth / window.innerHeight) < 1;
                  const baseFOV = isPortrait ? 85 : 50;
                  const flungFOV = isPortrait ? 50 : 25;
                  const slideFOV = isPortrait ? 90 : 55;
                  const boostFOVTarget = isPortrait ? 110 : 75;

                  if (playerRef.current.slideT !== undefined && slideObjectsRef.current && slideObjectsRef.current.curve) {
                      const slideCurve = slideObjectsRef.current.curve;
                      const pt = slideCurve.getPointAt(playerRef.current.slideT);
                      const tangent = slideCurve.getTangentAt(playerRef.current.slideT);
                      
                      const boostFOV = (Date.now() < playerRef.current.boostUntil) ? boostFOVTarget : slideFOV;
                      if (camera.fov) {
                          camera.fov += (boostFOV - camera.fov) * 0.1;
                          camera.updateProjectionMatrix();
                      }

                      camTarget = pt.clone().add(tangent.clone().multiplyScalar(20));
                      camPos = pt.clone().sub(tangent.clone().multiplyScalar(15)).add(new THREE.Vector3(0, 10, 0));
                  } else if (playerRef.current.isFlung) {
                      if (camera.fov && Math.abs(camera.fov - flungFOV) > 1) {
                          camera.fov += (flungFOV - camera.fov) * 0.15; 
                          camera.updateProjectionMatrix();
                      }
                      const camDist = 8;  
                      const camHeight = 3.0; 
                      const lookAhead = 10; 
                      
                      camPos = new THREE.Vector3(
                        playerRef.current.mesh.position.x - Math.sin(playerCamYaw) * camDist, 
                        playerRef.current.mesh.position.y + camHeight, 
                        playerRef.current.mesh.position.z - Math.cos(playerCamYaw) * camDist
                      );
                      camTarget = new THREE.Vector3(
                        playerRef.current.mesh.position.x + Math.sin(playerCamYaw) * lookAhead, 
                        playerRef.current.mesh.position.y - 1.0, 
                        playerRef.current.mesh.position.z + Math.cos(playerCamYaw) * lookAhead
                      );
                      lerpSpeed = 0.5; 
                  } else {
                      if (camera.fov && Math.abs(camera.fov - baseFOV) > 1) {
                          camera.fov += (baseFOV - camera.fov) * 0.1;
                          camera.updateProjectionMatrix();
                      }

                      const camDist = 14; 
                      const camHeight = 8; 
                      const lookAhead = 12;
                      
                      camPos = new THREE.Vector3(
                        playerRef.current.mesh.position.x - Math.sin(playerCamYaw) * camDist, 
                        playerRef.current.mesh.position.y + camHeight, 
                        playerRef.current.mesh.position.z - Math.cos(playerCamYaw) * camDist
                      );
                      
                      camTarget = new THREE.Vector3(
                        playerRef.current.mesh.position.x + Math.sin(playerCamYaw) * lookAhead, 
                        playerRef.current.mesh.position.y + 1.0, 
                        playerRef.current.mesh.position.z + Math.cos(playerCamYaw) * lookAhead
                      );
                  }

                  if (!cameraRef.current.lookAtTarget) cameraRef.current.lookAtTarget = new THREE.Vector3().copy(camTarget);

                  camera.position.lerp(camPos, lerpSpeed); 
                  cameraRef.current.lookAtTarget.lerp(camTarget, lerpSpeed); 
                  camera.lookAt(cameraRef.current.lookAtTarget);
                }

                renderer.render(scene, camera);
              };
              animate();

              setGameState('READY');
            };

            if (window.THREE) {
              initEngine();
            } else {
              const script = document.createElement('script');
              script.src = "https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js";
              script.onload = initEngine;

            }

            return () => {
              isMounted = false; cancelAnimationFrame(requestRef.current);
              if (resizeObserverRef.current && mountRef.current) resizeObserverRef.current.disconnect();
              if (rendererRef.current && mountRef.current) {
                 if (mountRef.current.contains(rendererRef.current.domElement)) mountRef.current.removeChild(rendererRef.current.domElement);
              }
            };
          }, [applyDifficultyToHexes]);

          // === 自由跟随摇杆与控制 ===
          const handleJoyTouchStart = useCallback((e) => {
              for (let i = 0; i < e.changedTouches.length; i++) {
                  const t = e.changedTouches[i];
                  if (joyRef.current.id === null) {
                      joyRef.current.id = t.identifier;
                      joyRef.current.ox = t.clientX;
                      joyRef.current.oy = t.clientY;
                      joyRef.current.px = 0;
                      joyRef.current.py = 0;
                      joyRef.current.active = true;
                      setJoystickState({ active: true, originX: t.clientX, originY: t.clientY, posX: 0, posY: 0 });
                      joystickRef.current = { x: 0, y: 0 };
                      break;
                  }
              }
          }, []);

          const handleJoyTouchMove = useCallback((e) => {
              if (joyRef.current.id === null) return;
              for (let i = 0; i < e.changedTouches.length; i++) {
                  const t = e.changedTouches[i];
                  if (t.identifier === joyRef.current.id) {
                      const maxDist = window.innerWidth < 640 ? 36 : 50; 
                      let dx = t.clientX - joyRef.current.ox;
                      let dy = t.clientY - joyRef.current.oy;
                      const dist = Math.sqrt(dx * dx + dy * dy);

                      // 【动态基座跟随】: 如果手指划出摇杆最大范围过多，摇杆基座会跟着手指走！
                      if (dist > maxDist * 1.5) {
                          const excess = dist - maxDist * 1.5;
                          joyRef.current.ox += (dx / dist) * excess;
                          joyRef.current.oy += (dy / dist) * excess;
                          dx = t.clientX - joyRef.current.ox;
                          dy = t.clientY - joyRef.current.oy;
                      }

                      const curDist = Math.sqrt(dx * dx + dy * dy);
                      let clampX = dx, clampY = dy;
                      if (curDist > maxDist) {
                          clampX = (dx / curDist) * maxDist;
                          clampY = (dy / curDist) * maxDist;
                      }

                      joyRef.current.px = clampX;
                      joyRef.current.py = clampY;
                      setJoystickState({ active: true, originX: joyRef.current.ox, originY: joyRef.current.oy, posX: clampX, posY: clampY });
                      joystickRef.current = { x: clampX / maxDist, y: clampY / maxDist };
                      break;
                  }
              }
          }, []);

          const handleJoyTouchEnd = useCallback((e) => {
              for (let i = 0; i < e.changedTouches.length; i++) {
                  const t = e.changedTouches[i];
                  if (t.identifier === joyRef.current.id) {
                      joyRef.current.id = null;
                      joyRef.current.active = false;
                      setJoystickState(prev => ({ ...prev, active: false }));
                      joystickRef.current = { x: 0, y: 0 };
                      break;
                  }
              }
          }, []);

          const handleJumpStart = () => { keysRef.current[' '] = true; };
          const handleJumpEnd = () => { keysRef.current[' '] = false; };

          // 【多层解析防穿模碰撞检测算法】
          const checkObstacleCollision = (player, diskGroup, hitboxes, cx, cz, diskSpeed = 0) => {
              if (!hitboxes || hitboxes.length === 0) return false;
              
              const playerPosLocal = new window.THREE.Vector3(player.mesh.position.x - cx, 0, player.mesh.position.z - cz);
              if(diskGroup?.rotation) playerPosLocal.applyAxisAngle(new window.THREE.Vector3(0, 1, 0), -diskGroup.rotation.y);

              if (player.mesh.position.y >= 2.8) return false; 
              const PLAYER_RADIUS = 0.85; 

              for (let box of hitboxes) {
                  const dx = playerPosLocal.x - box.x; const dz = playerPosLocal.z - box.z;
                  let dynamicHalfX = box.halfX + PLAYER_RADIUS; let dynamicHalfZ = box.halfZ + PLAYER_RADIUS;
                  let sweepDist = 0;

                  if (box.align === 'X') {
                      sweepDist = Math.abs(diskSpeed) * Math.abs(playerPosLocal.x) * 1.5; dynamicHalfZ += sweepDist; 
                  } else if (box.align === 'Z') {
                      sweepDist = Math.abs(diskSpeed) * Math.abs(playerPosLocal.z) * 1.5; dynamicHalfX += sweepDist;
                  }

                  if (Math.abs(dx) < dynamicHalfX && Math.abs(dz) < dynamicHalfZ) {
                       let pushSignX = 0, pushSignZ = 0;
                       if (box.align === 'X') {
                           let pushSign = dz >= 0 ? 1 : -1;
                           const cylVelZ = diskSpeed * playerPosLocal.x;
                           if (Math.abs(cylVelZ) > 0.02) pushSign = Math.sign(cylVelZ);
                           playerPosLocal.z = box.z + pushSign * (dynamicHalfZ + 0.05); pushSignZ = pushSign;
                       } else if (box.align === 'Z') {
                           let pushSign = dx >= 0 ? 1 : -1;
                           const cylVelX = -diskSpeed * playerPosLocal.z;
                           if (Math.abs(cylVelX) > 0.02) pushSign = Math.sign(cylVelX);
                           playerPosLocal.x = box.x + pushSign * (dynamicHalfX + 0.05); pushSignX = pushSign;
                       }

                       let correctedWorldPos = playerPosLocal.clone();
                       if(diskGroup?.rotation) correctedWorldPos.applyAxisAngle(new window.THREE.Vector3(0, 1, 0), diskGroup.rotation.y);
                       player.mesh.position.x = cx + correctedWorldPos.x; player.mesh.position.z = cz + correctedWorldPos.z;
                       
                       const pushLocal = new window.THREE.Vector3(pushSignX, 0, pushSignZ); 
                       if(diskGroup?.rotation) pushLocal.applyAxisAngle(new window.THREE.Vector3(0, 1, 0), diskGroup.rotation.y);
                       
                       player.knockback.set(pushLocal.x * 1.2, 0, pushLocal.z * 1.2);
                       if (player.vel.y <= 0) player.vel.y = 0.3;
                       return true;
                  }
              }
              return false;
          };

          // === 物理与碰撞逻辑 ===
          const updatePhysics = (THREE) => {
            const player = playerRef.current;
            if (!player || !player.mesh || !player.mesh.position) return;

            const maxSpeed = player.onTurntable ? 0.85 : 0.46; 
            const accel = player.onTurntable ? 0.08 : 0.018;   
            const friction = 0.97; const jumpForce = 0.52; const gravity = 0.025; 
            let isMoving = false; let currentlyGrounded = false; 
            const timeNow = Date.now();
            const pZ = player.mesh.position.z;

            pendulumsRef.current.forEach(p => {
                if (p?.pivot?.rotation) {
                    p.pivot.rotation.z = Math.sin((timeNow + p.delay) * 0.0018) * (Math.PI / 2.2); 
                    p.pivot.updateMatrixWorld(true);
                }
                if (p?.head) {
                    const headPos = new window.THREE.Vector3(); p.head.getWorldPosition(headPos);
                    const dx = player.mesh.position.x - headPos.x; const dy = player.mesh.position.y - headPos.y; const dz = pZ - headPos.z;
                    const dist = Math.sqrt(dx*dx + dy*dy + dz*dz);
                    if (dist < 4.8) {
                        const horizontalDist = Math.sqrt(dx*dx + dz*dz);
                        const pushDirX = horizontalDist > 0 ? dx / horizontalDist : (Math.random() - 0.5);
                        const pushDirZ = horizontalDist > 0 ? dz / horizontalDist : 1;
                        player.knockback.set(pushDirX * 3.5, 0, pushDirZ * 3.5); player.vel.y = 0.55; 
                    }
                }
            });

            const ballFireInterval = difficultyRef.current === 'HELL' ? 1333 : 2000;
            if (currentStageRef.current === 1 && timeNow - lastFireTimeRef.current > ballFireInterval) { 
                const ball = new THREE.Mesh(new THREE.SphereGeometry(7, 32, 32), new THREE.MeshStandardMaterial({color: 0xef4444, roughness: 0.4}));
                ball.position.set((Math.random() - 0.5) * 60, 7, -300 + 15); ball.castShadow = true;
                sceneRef.current.add(ball); ballsRef.current.push({ mesh: ball, active: true });
                lastFireTimeRef.current = timeNow;
            }

            ballsRef.current.forEach(ball => {

                ball.mesh.position.z += 0.9; ball.mesh.rotation.x += 0.1; 
                const dx = player.mesh.position.x - ball.mesh.position.x; const dy = player.mesh.position.y - ball.mesh.position.y; const dz = pZ - ball.mesh.position.z;
                const dist = Math.sqrt(dx*dx + dy*dy + dz*dz);
                if (dist < 7.7) {
                    const horizontalDist = Math.sqrt(dx*dx + dz*dz);
                    const pushDirX = horizontalDist > 0 ? dx / horizontalDist : (Math.random() - 0.5);
                    const pushDirZ = horizontalDist > 0 ? dz / horizontalDist : 1;
                    player.knockback.set(pushDirX * 1.8, 0, pushDirZ * 1.8); player.vel.y = 0.45; 
                }
                if (ball.mesh.position.z > START_POS.z + 10) { 
                    sceneRef.current.remove(ball.mesh); 
                    if(ball.mesh.geometry) ball.mesh.geometry.dispose(); 
                    if(ball.mesh.material) ball.mesh.material.dispose(); 
                    ball.active = false;
                }
            });
            ballsRef.current = ballsRef.current.filter(b => b.active);

            let inputX = joystickRef.current.x; let inputZ = joystickRef.current.y;
            if (keysRef.current['w'] || keysRef.current['arrowup']) inputZ -= 1; 
            if (keysRef.current['s'] || keysRef.current['arrowdown']) inputZ += 1; 
            if (keysRef.current['a'] || keysRef.current['arrowleft']) inputX -= 1; 
            if (keysRef.current['d'] || keysRef.current['arrowright']) inputX += 1; 

            if (player.isLocked || player.isFlung) {
                inputX = 0;
                inputZ = 0;
            }

            const isInputActive = inputX !== 0 || inputZ !== 0;
            if (!isInputActive) player.inputLockedCamYaw = null;

            if (isInputActive) {
                isMoving = true;
                const length = Math.sqrt(inputX * inputX + inputZ * inputZ); const scale = length > 1 ? 1 / length : 1;
                const dir = new THREE.Vector3(inputX * scale, 0, inputZ * scale);
                const refYaw = player.inputLockedCamYaw !== null ? player.inputLockedCamYaw : player.camYaw;
                dir.applyAxisAngle(new THREE.Vector3(0, 1, 0), refYaw - Math.PI);
                player.vel.x += dir.x * accel; player.vel.z += dir.z * accel;
                player.targetRotationY = Math.atan2(player.vel.x, player.vel.z);
            }

            let yawDiff = player.targetRotationY - player.camYaw;
            while (yawDiff < -Math.PI) yawDiff += Math.PI * 2; while (yawDiff > Math.PI) yawDiff -= Math.PI * 2;
            const isRunningBackwards = Math.abs(yawDiff) > Math.PI * 0.55;

            if (isMoving && isRunningBackwards) player.backwardRunTime += 16.6; else player.backwardRunTime = 0; 

            if (isRunningBackwards && player.backwardRunTime >= 500 && !player.isQuickTurning) {
                player.isQuickTurning = true;
                if (player.inputLockedCamYaw === null) player.inputLockedCamYaw = player.camYaw;
            }

            if (player.isQuickTurning) {
                const turnSpeed = 0.15; 
                if (Math.abs(yawDiff) <= turnSpeed) { player.camYaw = player.targetRotationY; player.isQuickTurning = false; } 
                else { player.camYaw += Math.sign(yawDiff) * turnSpeed; }
            } else {
                let camLerpFactor = 0.012; 
                if (isRunningBackwards && player.backwardRunTime < 500) camLerpFactor = 0; 
                player.camYaw += yawDiff * camLerpFactor;
            }

            if (!player.isFlung) {
                player.vel.x *= friction; player.vel.z *= friction;
                const currentSpeedLimit = Math.sqrt(player.vel.x * player.vel.x + player.vel.z * player.vel.z);
                if (currentSpeedLimit > maxSpeed) {
                    player.vel.x = (player.vel.x / currentSpeedLimit) * maxSpeed; player.vel.z = (player.vel.z / currentSpeedLimit) * maxSpeed;
                }
            }

            // === 第三关：极速水滑道强制物理覆盖 ===
            let isSliding = false;
            if (pZ <= -775 && currentStageRef.current === 3 && pZ > -3200 && slideObjectsRef.current && !player.hasFinishedSlide) {
                isSliding = true;
                isMoving = true;
                
                if (player.slideT === undefined || isNaN(player.slideT)) {
                    player.slideT = 0;
                    player.slideOffsetX = 0;
                    player.slideVelocityX = 0; 
                    player.slideSpeed = 0.0014; 
                    player.isSpinning = false;
                    player.spinTime = 0;
                    player.isLocked = false;
                    player.blockedUntil = 0; 
                }

                if (player.slideT > 0.88) {
                    player.isLocked = true;
                    player.slideOffsetX *= 0.80; 
                    player.slideVelocityX *= 0.50; 
                    player.slideSpeed += 0.00004; 
                }

                if (!player.isSpinning && !player.isLocked && Date.now() > player.blockedUntil) {
                    player.slideVelocityX += inputX * 0.08; 
                }

                const slideCurve = slideObjectsRef.current.curve;
                const tPrev = Math.max(0, player.slideT - 0.005);
                const tNext = Math.min(1, player.slideT + 0.005);
                const tanPrev = slideCurve.getTangentAt(tPrev);
                const tanNext = slideCurve.getTangentAt(tNext);
                const curveTurn = tanNext.x - tanPrev.x; 
                
                player.slideVelocityX -= curveTurn * 0.5; 
                player.slideVelocityX -= player.slideOffsetX * 0.01; 
                player.slideVelocityX *= 0.85; 

                player.slideOffsetX += player.slideVelocityX;

                let currentSpeed = player.slideSpeed;
                if (Date.now() < player.boostUntil) {
                    currentSpeed *= 1.4; 
                }
                if (Date.now() < player.blockedUntil) {
                    currentSpeed *= 0.3; 
                }
                if (player.isSpinning) {
                    currentSpeed *= 0.6; 
                    player.spinTime -= 16.6;
                    if (player.spinTime <= 0) player.isSpinning = false;

                player.slideT += currentSpeed;

                if (player.slideT >= 0.99) {

                    player.slideVelocityX = 0;

                    const tangent = slideCurve.getTangentAt(player.slideT);

                   ((prevY >= floorHeight - 1.0 && player.mesh.position.y <= floorHeight + 1.0) ||

                    if (pZ < -2800 && gameStateRef.current !== 'WIN') {

            if (!player.wasOnGround && currentlyGrounded) player.jumpCooldownUntil = Date.now() + 180;

                    if (bGroup) bGroup.rotation.x = 0;

                      if (aR) { aR.rotation.x = 0; aR.rotation.z = 0; }

            if (!quiz1TriggeredRef.current && pZ < QUIZ1_TRIGGER_Z && currentStageRef.current === 1) {

            if (quizType === 'QUIZ_1') {

                if (isCorrect) {
