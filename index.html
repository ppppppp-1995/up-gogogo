                    if (shortcutRef.current) {
                        shortcutRef.current.active = true; 
                        if(shortcutRef.current.mainGroup) { shortcutRef.current.mainGroup.visible = true; shortcutRef.current.mainGroup.position.y = -50; }
                        if(shortcutRef.current.bridgesGroup) { shortcutRef.current.bridgesGroup.visible = true; shortcutRef.current.bridgesGroup.position.y = -50; }
                        
                        const elevateShortcut = () => {
                            if(shortcutRef.current.mainGroup && shortcutRef.current.mainGroup.position.y < 0) {
                                shortcutRef.current.mainGroup.position.y += 2; 
                                if(shortcutRef.current.bridgesGroup) shortcutRef.current.bridgesGroup.position.y += 2;
                                requestAnimationFrame(elevateShortcut);
                            } else {
                                if(shortcutRef.current.mainGroup) shortcutRef.current.mainGroup.position.y = 0; 
                                if(shortcutRef.current.bridgesGroup) shortcutRef.current.bridgesGroup.position.y = 0;
                            }
                        }
                        elevateShortcut();
                    }
                }
            } else if (quizType === 'QUIZ_3') {
                isCorrect = ans === 'B'; setQuizResult(isCorrect ? 'CORRECT' : 'WRONG');
                if (isCorrect) {
                    quiz3PassedRef.current = true;
                    if (playerRef.current && playerRef.current.shieldBubble) {
                        playerRef.current.hasShield = true;
                        playerRef.current.shieldBubble.visible = true; 
                    }
                }
            }
            
            setQuizFeedback(isCorrect ? 'CORRECT' : 'WRONG');
            setTimeout(() => { setQuizFeedback(null); setGameState('PLAYING_RESUME'); }, 1200);
          };

          const handleFall = (reason = 'FALL') => {
            if (gameStateRef.current === 'FALLEN') return; 
            setFallReason(reason);
            gameStateRef.current = 'FALLEN'; setGameState('FALLEN');

            if (playerRef.current && playerRef.current.limbs) {
                const limbs = playerRef.current.limbs;
                if (limbs.apuModel) limbs.apuModel.rotation.set(0, 0, 0);
                if (limbs.bodyGroup) {
                    limbs.bodyGroup.rotation.set(0, 0, 0);
                    limbs.bodyGroup.position.y = 0;
                }
                if (limbs.armL) { limbs.armL.rotation.set(0, 0, 0); }
                if (limbs.armR) { limbs.armR.rotation.set(0, 0, 0); }
                if (limbs.legL) limbs.legL.rotation.set(0, 0, 0);
                if (limbs.legR) limbs.legR.rotation.set(0, 0, 0);
            }

            setTimeout(() => {
              if (playerRef.current && playerRef.current.mesh) {
                const cp = checkpointRef.current;
                if(playerRef.current.mesh.position) playerRef.current.mesh.position.set(cp.x, cp.y, cp.z);
                if(playerRef.current.vel) playerRef.current.vel.set(0, 0, 0); 
                if(playerRef.current.knockback) playerRef.current.knockback.set(0, 0, 0);
                
                if(playerRef.current.mesh.rotation) playerRef.current.mesh.rotation.set(0, Math.PI, 0); 
                if(playerRef.current.limbs && playerRef.current.limbs.apuModel) playerRef.current.limbs.apuModel.rotation.set(0, 0, 0);
                if(playerRef.current.limbs && playerRef.current.limbs.bodyGroup) playerRef.current.limbs.bodyGroup.rotation.set(0, 0, 0);

                playerRef.current.targetRotationY = Math.PI; 
                playerRef.current.camYaw = Math.PI; 
                playerRef.current.jumpCooldownUntil = 0; 
                playerRef.current.backwardRunTime = 0; 
                playerRef.current.isQuickTurning = false; 
                playerRef.current.inputLockedCamYaw = null;
                
                playerRef.current.boostUntil = 0;
                playerRef.current.isLocked = false;
                playerRef.current.isFlung = false;
                
                if (checkpointRef.current.z <= -2800) {
                    playerRef.current.hasFinishedSlide = true; 
                } else {
                    playerRef.current.hasFinishedSlide = false; 
                }
                
                playerRef.current.blockedUntil = 0;
                playerRef.current.slideT = undefined; 
                playerRef.current.slideOffsetX = 0;
                playerRef.current.slideVelocityX = 0;
                playerRef.current.isSpinning = false;
                playerRef.current.spinTime = 0;
              }
              if (cameraRef.current && window.THREE) {
                const cp = checkpointRef.current; const resetRotY = Math.PI;
                if(cameraRef.current.position) cameraRef.current.position.set(cp.x - Math.sin(resetRotY) * 12, cp.y + 7, cp.z - Math.cos(resetRotY) * 12);
                const resetLookAt = new window.THREE.Vector3(cp.x + Math.sin(resetRotY) * 10, cp.y + 1.0, cp.z + Math.cos(resetRotY) * 10);
                cameraRef.current.lookAtTarget = resetLookAt; 
                if(typeof cameraRef.current.lookAt === 'function') cameraRef.current.lookAt(resetLookAt);
                if (cameraRef.current.fov) { cameraRef.current.fov = 50; cameraRef.current.updateProjectionMatrix(); }
              }
              
              if (!quiz1PassedRef.current) quiz1TriggeredRef.current = false;
              if (!quiz2PassedRef.current) quiz2TriggeredRef.current = false;
              if (!quiz3PassedRef.current) {
                  quiz3TriggeredRef.current = false;
                  if (playerRef.current) {
                      playerRef.current.hasShield = false;
                      if(playerRef.current.shieldBubble) playerRef.current.shieldBubble.visible = false;
                  }
              }

              if (slideObjectsRef.current && slideObjectsRef.current.objects) {
                  slideObjectsRef.current.objects.forEach(obj => {
                      obj.active = true;
                      if(obj.mesh) obj.mesh.visible = true;
                  });
              }

              hexesRef.current.forEach(hex => {
                if (!hex) return; 
                hex.status = 'STABLE'; hex.shakeTime = 0; 
                if(hex.mesh && hex.mesh.position) { hex.mesh.position.y = 0; hex.mesh.position.x = hex.origX; }
                if(hex.mesh && hex.mesh.rotation) hex.mesh.rotation.x = 0;
                
                if (currentStageRef.current === 1 && quizResultRef.current === 'CORRECT' && hex.isSafe) {
                  hex.isGlowing = true; 
                  if(hex.outerMat) { hex.outerMat.color.setHex(0xffe600); hex.outerMat.emissive.setHex(0xffe600); }
                  if(hex.innerMat) hex.innerMat.emissive.setHex(0xffe600); 
                } else if (hex.isGlowing || hex.isTrap) {
                  hex.isGlowing = false; 
                  if(hex.outerMat) { hex.outerMat.color.setHex(0xffffff); hex.outerMat.emissive.setHex(0x000000); hex.outerMat.emissiveIntensity = 0; }
                  if(hex.innerMat) { hex.innerMat.emissive.setHex(0x000000); hex.innerMat.emissiveIntensity = 0; }
                }
              });
              
              ballsRef.current.forEach(ball => { 
                  if (sceneRef.current && ball && ball.mesh) sceneRef.current.remove(ball.mesh); 
                  if(ball && ball.mesh && ball.mesh.geometry) ball.mesh.geometry.dispose(); 
                  if(ball && ball.mesh && ball.mesh.material) ball.mesh.material.dispose();
              }); 
              ballsRef.current = [];
              setGameState('PLAYING');
            }, 1200);
          };

          useEffect(() => {
            let interval;
            if (gameState === 'START_COUNTDOWN') {
              if (countdown > 0) {
                  interval = setTimeout(() => setCountdown(c => c - 1), 1000); 
              } else {
                  setGameState('PLAYING');
                  startTimeRef.current = Date.now();
              }
            } else if (gameState === 'QUIZ' && !quizFeedback) { 
              if (timer > 0) interval = setTimeout(() => setTimer(t => t - 1), 1000); else handleQuizAnswer('TIMEOUT');
            }
            return () => clearTimeout(interval);
          }, [gameState, countdown, timer, quizFeedback]);

          // 注意：答题状态(QUIZ)去除了控制板，防止左侧广阔的摇杆感应区阻挡了答题选项。
          const showMobileControls = isTouchDevice && (gameState === 'PLAYING' || gameState === 'PLAYING_RESUME' || gameState === 'WIN');

          return (
            <div className="flex flex-col items-center justify-center min-h-screen font-sans text-slate-800 overflow-hidden md:p-4">
              
              {/* 微信内置浏览器专属引导层 */}
              {showWechatPrompt && (
                  <div className="fixed inset-0 bg-slate-900/90 z-[10000] flex flex-col items-center justify-start pt-16 px-6 text-white text-center">
                      <div className="absolute top-4 right-8 text-5xl font-black animate-bounce text-yellow-400">↗</div>
                      <h2 className="text-3xl font-black mb-6 mt-8 tracking-widest text-sky-300">请在外部浏览器打开</h2>
                      <p className="text-slate-200 text-base mb-10 leading-relaxed font-bold">
                          微信内置环境强制限制了屏幕旋转<br/><br/>
                          为了获得最爽快的横屏 3D 跑酷体验<br/>
                          请点击右上角 <span className="text-white font-black bg-slate-700 px-3 py-1 rounded-lg mx-1 shadow-inner">···</span> <br/><br/>
                          选择 <span className="text-white font-black bg-sky-600 px-3 py-1 rounded-lg mx-1 shadow-inner">在默认浏览器打开</span>
                      </p>
                      <button onClick={() => setShowWechatPrompt(false)} className="px-8 py-3 rounded-full border-2 border-slate-500 text-slate-400 text-sm active:bg-slate-800 transition-colors">
                          不，我就要在微信竖屏玩
                      </button>
                  </div>
              )}

              <div className="relative w-full h-[100dvh] md:h-[82vh] max-w-6xl md:rounded-[2.5rem] overflow-hidden md:border-8 border-white shadow-none md:shadow-[0_20px_50px_rgba(2,132,199,0.3)] bg-sky-400">
                
                <div ref={mountRef} className="absolute inset-0 z-0" />

                {/* --- 移动端触屏按键：左半屏自由摇杆系统 --- */}
                {showMobileControls && (
                  <>
                    {/* 自由摇杆：左半屏透明感应区 */}
                    <div 
                        className="absolute left-0 top-0 w-1/2 h-full z-40 touch-none"
                        onTouchStart={handleJoyTouchStart}
                        onTouchMove={handleJoyTouchMove}
                        onTouchEnd={handleJoyTouchEnd}
                        onTouchCancel={handleJoyTouchEnd}
                    />

                    {/* 自由摇杆：动态生成的视觉 UI */}
                    <div 
                        className={`fixed w-28 h-28 sm:w-36 sm:h-36 -ml-[56px] -mt-[56px] sm:-ml-[72px] sm:-mt-[72px] bg-white/20 backdrop-blur-md rounded-full border-[3px] border-white/40 shadow-[inset_0_0_20px_rgba(255,255,255,0.2)] flex items-center justify-center z-50 pointer-events-none transition-opacity duration-200 ${joystickState.active ? 'opacity-100 scale-100' : 'opacity-0 scale-90'}`}
                        style={{
                            left: joystickState.originX,
                            top: joystickState.originY
                        }}
                    >
                        {/* 摇杆中心小圆圈 */}
                        <div 
                            className="w-10 h-10 sm:w-14 sm:h-14 bg-white/90 rounded-full shadow-[0_5px_15px_rgba(0,0,0,0.2)] transition-transform duration-75" 
                            style={{ transform: `translate(${joystickState.posX}px, ${joystickState.posY}px)` }} 
                        />
                    </div>

                    {/* 右下角跳跃按钮 */}
                    <div onTouchStart={handleJumpStart} onTouchEnd={handleJumpEnd} onTouchCancel={handleJumpEnd} className="absolute bottom-8 right-4 sm:bottom-10 sm:right-10 w-24 h-24 sm:w-28 sm:h-28 bg-white/20 backdrop-blur-md rounded-full border-[3px] border-white/40 flex items-center justify-center z-50 touch-none active:bg-white/40 active:scale-90 transition-all shadow-[0_5px_20px_rgba(0,0,0,0.15)]">
                      <span className="text-white font-black text-xl sm:text-2xl pointer-events-none tracking-widest drop-shadow-md">跳跃</span>
                    </div>
                  </>
                )}

                {gameState === 'LOADING' && (
                  <div className="absolute inset-0 z-50 flex flex-col items-center justify-center bg-sky-500 text-white">
                     <Loader2 className="w-20 h-20 animate-spin text-white mb-6 drop-shadow-md" />
                     <p className="text-3xl font-black tracking-widest animate-pulse drop-shadow-md">构建梦幻游乐园...</p>
                  </div>
                )}

                {gameState === 'READY' && (
                  <div className="absolute inset-0 z-40 flex flex-col items-center justify-center bg-sky-900/40 backdrop-blur-sm p-4 md:p-8 text-center transition-opacity duration-500 overflow-y-auto hide-scrollbar">
                    <h1 className="text-4xl sm:text-5xl md:text-7xl font-black mb-6 italic tracking-tighter text-white drop-shadow-[0_8px_0_#0284c7] mt-8">阿噗向前冲!</h1>
                    
                    <div className="flex flex-col md:flex-row gap-4 md:gap-6 mb-6 md:mb-8 w-full max-w-2xl justify-center items-stretch">
                        <div className="bg-white/20 backdrop-blur-md p-4 md:p-6 rounded-3xl border-2 border-white/40 flex-1 flex flex-col justify-between shadow-xl">
                            <p className="text-white font-bold tracking-widest mb-3 md:mb-4 drop-shadow-md">选择游戏难度</p>
                            <div className="flex gap-2 justify-center flex-wrap mb-3 md:mb-0">
                                {[
                                    { id: 'EASY', name: '简单' },
                                    { id: 'NORMAL', name: '普通' },
                                    { id: 'HELL', name: '地狱' }
                                ].map(diff => (
                                    <button 
                                        key={diff.id}
                                        onClick={() => handleDifficultyChange(diff.id)}
                                        className={`px-3 py-1.5 md:px-4 md:py-2 rounded-xl border-2 font-black transition-all duration-300 text-sm md:text-base ${difficulty === diff.id ? 'border-white bg-white/30 scale-110 shadow-[0_0_15px_rgba(255,255,255,0.5)] text-white' : 'border-white/40 hover:scale-105 opacity-80 text-sky-100'}`}
                                    >
                                        {diff.name}
                                    </button>
                                ))}
                            </div>
                            <p className="text-sky-100 text-xs md:text-sm mt-3 h-8 md:h-10 flex items-center justify-center drop-shadow-md font-bold leading-tight">
                                {[
                                    { id: 'EASY', desc: '适合新手：无陷阱，安全区占比 25%' },
                                    { id: 'NORMAL', desc: '标准挑战：陷阱 10%，安全区占比 20%' },
                                    { id: 'HELL', desc: '受苦之旅：陷阱 20%，安全区 18% (多滚石+极速盘)' }
                                ].find(d => d.id === difficulty).desc}
                            </p>
                        </div>

                        <div className="bg-white/20 backdrop-blur-md p-4 md:p-6 rounded-3xl border-2 border-white/40 flex-1 flex flex-col justify-between shadow-xl">
                            <p className="text-white font-bold tracking-widest mb-3 md:mb-4 drop-shadow-md">选择阿噗造型</p>
                            <div className="flex gap-3 justify-center mb-3 md:mb-0">
                                {SKINS.map(skin => (
                                    <button 
                                        key={skin.id}
                                        onClick={() => setActiveSkin(skin)}
                                        className={`w-10 h-10 md:w-14 md:h-14 rounded-full border-4 transition-all duration-300 ${activeSkin.id === skin.id ? 'border-white scale-125 shadow-[0_0_15px_rgba(255,255,255,0.8)]' : 'border-white/40 hover:scale-110 opacity-80'}`}
                                        style={{ backgroundColor: skin.hex }}
                                        title={skin.name}
                                    />
                                ))}
                            </div>
                            <p className="text-sky-100 text-xs md:text-sm mt-3 h-8 md:h-10 flex items-center justify-center font-bold drop-shadow-md">
                                当前皮肤: {activeSkin.name}
                            </p>
                        </div>
                    </div>

                    <button onClick={startGame} className="px-8 sm:px-10 md:px-16 py-3 sm:py-4 md:py-6 bg-pink-400 text-white font-black text-xl sm:text-2xl md:text-4xl rounded-full hover:bg-pink-500 active:scale-95 shadow-[0_6px_0_#be185d] md:shadow-[0_8px_0_#be185d] flex justify-center items-center gap-2 sm:gap-4 transition-all hover:scale-105 border-4 border-pink-300 mb-8 mx-auto">
                      <Play className="fill-current w-6 h-6 md:w-10 md:h-10" /> 闯入游乐园
                    </button>
                  </div>
                )}

                {gameState === 'START_COUNTDOWN' && (
                  <div className="absolute inset-0 z-40 flex flex-col items-center justify-center">
                     <div className="text-[10rem] sm:text-[12rem] md:text-[15rem] font-black text-white italic drop-shadow-[0_15px_0_#be185d] animate-ping">
                       {countdown > 0 ? countdown : 'GO!'}
                     </div>
                  </div>
                )}

                {(gameState === 'PLAYING' || gameState === 'PLAYING_RESUME') && (
                  <div className="absolute top-4 sm:top-6 left-0 right-0 flex justify-center z-10 pointer-events-none">
                    <div className="bg-white/90 border-4 border-sky-200 rounded-full px-6 sm:px-8 py-2 sm:py-3 flex items-center gap-2 sm:gap-3 shadow-xl">
                       <Trophy className="text-yellow-500 w-5 h-5 sm:w-6 sm:h-6" />
                       <span className="font-black tracking-widest uppercase italic text-sky-800 text-sm sm:text-base md:text-lg">
                         第 {currentStage} 关：
                         {currentStage === 1 && "深渊迷阵"}
                         {currentStage === 2 && "眩晕转盘"}
                         {currentStage === 3 && "极速水滑道"}
                       </span>
                    </div>
                  </div>
                )}

                {gameState === 'QUIZ' && (
                  <div className="absolute inset-0 z-30 flex flex-col items-center justify-center bg-sky-900/60 backdrop-blur-md p-2 sm:p-4 animate-in fade-in zoom-in duration-300">
                    {quizFeedback ? (
                        <div className="flex flex-col items-center animate-bounce">
                            {quizFeedback === 'CORRECT' ? (
                                <>
                                    <CheckCircle className="text-green-400 w-20 h-20 sm:w-24 sm:h-24 mb-4 sm:mb-6 drop-shadow-lg" />
                                    <span className="font-black text-green-400 text-4xl sm:text-5xl tracking-widest drop-shadow-lg mb-3 sm:mb-4">回答正确!</span>
                                    <span className="font-bold text-white text-lg sm:text-2xl drop-shadow-md bg-green-500/40 px-4 sm:px-6 py-2 rounded-full backdrop-blur-sm text-center">
                                        {quizType === 'QUIZ_1' && '恭喜！朝着提示路线前进吧！'}
                                        {quizType === 'QUIZ_2' && '恭喜您，捷径大转盘为您升起。'}
                                        {quizType === 'QUIZ_3' && '恭喜！获得【婵娟防护罩】！'}
                                    </span>
                                </>
                            ) : (
                                <>
                                    <XCircle className="text-red-400 w-20 h-20 sm:w-24 sm:h-24 mb-4 sm:mb-6 drop-shadow-lg" />
                                    <span className="font-black text-red-400 text-4xl sm:text-5xl tracking-widest drop-shadow-lg mb-3 sm:mb-4">回答错误!</span>
                                    <span className="font-bold text-white text-lg sm:text-2xl drop-shadow-md bg-red-500/40 px-4 sm:px-6 py-2 rounded-full backdrop-blur-sm text-center">
                                        {quizType === 'QUIZ_1' && '很遗憾，您未能获得提示。'}
                                        {quizType === 'QUIZ_2' && '很遗憾，您未能解锁捷径。'}
                                        {quizType === 'QUIZ_3' && '缺少防护罩，小心躲避障碍物！'}
                                    </span>
                                </>
                            )}
                        </div>
                    ) : (
                        <>
                            {/* iOS横屏等小屏幕手机的适配：限制最大高度，缩减空隙，增加滚动 */}
                            <div className="absolute top-2 sm:top-6 flex gap-2 sm:gap-4 text-white font-black text-2xl sm:text-4xl drop-shadow-md">
                                <Timer className={timer <= 3 ? "text-red-400 animate-pulse w-8 h-8 sm:w-10 sm:h-10" : "text-white w-8 h-8 sm:w-10 sm:h-10"} />
                                {timer}s
                            </div>
                            
                            <div className="bg-white border-4 md:border-8 border-pink-300 p-4 sm:p-6 md:p-10 rounded-[1.5rem] md:rounded-[2.5rem] shadow-2xl w-full max-w-xl max-h-[85vh] overflow-y-auto hide-scrollbar mt-12 sm:mt-16">
                              <div className="inline-block bg-pink-100 text-pink-600 px-3 py-1 rounded-full font-black uppercase tracking-widest text-xs sm:text-sm mb-3 md:mb-4">
                                 赛道问答 - 第 {currentStage} 关
                              </div>
                              
                              <p className="text-sky-600 font-black text-sm sm:text-lg mb-4 md:mb-6 border-l-4 border-sky-400 pl-3 leading-snug">
                                  {quizType === 'QUIZ_1' && '🎁 答对题目将获得正确路径提示'}
                                  {quizType === 'QUIZ_2' && '🎁 答对题目将获得通关捷径'}
                                  {quizType === 'QUIZ_3' && '🎁 答对题目将获得一次性防护罩'}
                              </p>
                              
                              {quizType === 'QUIZ_1' && (
                                  <>
                                    <h2 className="text-lg sm:text-2xl md:text-3xl font-black mb-4 md:mb-8 text-slate-800 leading-tight">苏轼的字是（&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;）</h2>
                                    <div className="grid gap-2 sm:gap-4">
                                      {['A. 子由', 'B. 自由', 'C. 子瞻'].map((opt) => (
                                        <button key={opt} onClick={() => handleQuizAnswer(opt[0])} className="w-full p-3 sm:p-4 md:p-6 bg-sky-50 hover:bg-sky-500 hover:text-white rounded-xl sm:rounded-2xl font-black text-base sm:text-xl text-left transition-colors flex justify-between items-center group border-[3px] border-sky-100 shadow-sm active:bg-sky-400">
                                          {opt} <ChevronRight className="opacity-0 group-hover:opacity-100 transition-opacity" size={24} />
                                        </button>
                                      ))}
                                    </div>
                                  </>
                              )}
                              
                              {quizType === 'QUIZ_2' && (
                                  <>
                                    <h2 className="text-lg sm:text-2xl md:text-3xl font-black mb-4 md:mb-8 text-slate-800 leading-tight">"莫听穿林打叶声"的下一句是（&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;）？</h2>
                                    <div className="grid gap-2 sm:gap-4">
                                      {['A. 何妨吟啸且徐行', 'B. 此处无声胜有声', 'C. 多少楼台烟雨中'].map((opt) => (
                                        <button key={opt} onClick={() => handleQuizAnswer(opt[0])} className="w-full p-3 sm:p-4 md:p-6 bg-sky-50 hover:bg-sky-500 hover:text-white rounded-xl sm:rounded-2xl font-black text-base sm:text-xl text-left transition-colors flex justify-between items-center group border-[3px] border-sky-100 shadow-sm active:bg-sky-400">
                                          {opt} <ChevronRight className="opacity-0 group-hover:opacity-100 transition-opacity" size={24} />
                                        </button>
                                      ))}
                                    </div>
                                  </>
                              )}

                              {quizType === 'QUIZ_3' && (
                                  <>
                                    <h2 className="text-lg sm:text-2xl md:text-3xl font-black mb-4 md:mb-8 text-slate-800 leading-tight">"但愿人长久，千里共婵娟"中的"婵娟"意思是？</h2>
                                    <div className="grid gap-2 sm:gap-4">
                                      {['A. 嫦娥', 'B. 月亮', 'C. 诗词'].map((opt) => (
                                        <button key={opt} onClick={() => handleQuizAnswer(opt[0])} className="w-full p-3 sm:p-4 md:p-6 bg-sky-50 hover:bg-sky-500 hover:text-white rounded-xl sm:rounded-2xl font-black text-base sm:text-xl text-left transition-colors flex justify-between items-center group border-[3px] border-sky-100 shadow-sm active:bg-sky-400">
                                          {opt} <ChevronRight className="opacity-0 group-hover:opacity-100 transition-opacity" size={24} />
                                        </button>
                                      ))}
                                    </div>
                                  </>
                              )}
                            </div>
                        </>
                    )}
                  </div>
                )}

                {gameState === 'FALLEN' && (
                  <div className={`absolute inset-0 z-40 bg-pink-500/30 flex items-center justify-center ${fallReason === 'ROADBLOCK' ? 'crash-shake' : ''}`}>
                     <div className={`bg-white border-[6px] md:border-8 px-6 sm:px-8 md:px-12 py-4 md:py-6 rounded-[2rem] md:rounded-[3rem] font-black text-2xl sm:text-4xl md:text-5xl italic tracking-tighter shadow-2xl transform rotate-2 animate-bounce text-center ${fallReason === 'ROADBLOCK' ? 'border-red-500 text-red-500 scale-110' : 'border-pink-400 text-pink-500'}`}>
                        {fallReason === 'ROADBLOCK' ? '💥 撞到路障啦! 淘汰!' : '掉下深渊啦! 重新出发!'}
                     </div>
                  </div>
                )}

                {gameState === 'WIN' && (
                  <div className="absolute inset-0 z-[45] flex flex-col items-center justify-center pointer-events-none">
                    <h2 className="text-5xl sm:text-7xl md:text-9xl font-black italic text-yellow-300 drop-shadow-[0_10px_20px_rgba(0,0,0,0.5)] animate-bounce" style={{ WebkitTextStroke: '3px #b45309' }}>
                       恭喜通关
                    </h2>
                    
                    {finalTime && (
                        <div className="mt-4 sm:mt-6 bg-black/60 px-6 sm:px-8 py-2 sm:py-3 rounded-full border-2 sm:border-4 border-yellow-400 shadow-[0_0_20px_rgba(250,204,21,0.6)] animate-in fade-in zoom-in duration-1000 delay-500">
                           <span className="text-yellow-400 text-lg sm:text-2xl md:text-4xl font-black tracking-widest">
                               ⏱️ 通关用时: {finalTime} 秒
                           </span>
                        </div>
                    )}

                    <div className="fixed inset-0 pointer-events-none z-[100] overflow-hidden">
                        {[...Array(100)].map((_, i) => (
                            <div key={i} className="absolute top-[-10%]" style={{
                                left: `${Math.random() * 100}%`,
                                width: `${Math.random() * 10 + 6}px`,
                                height: `${Math.random() * 20 + 10}px`,
                                backgroundColor: ['#facc15', '#f43f5e', '#38bdf8', '#4ade80', '#a855f7'][Math.floor(Math.random() * 5)],
                                animation: `confetti-fall ${Math.random() * 3 + 2}s linear ${Math.random() * 2}s infinite`,
                                borderRadius: Math.random() > 0.5 ? '50%' : '2px'
                            }} />
                        ))}
                    </div>
                  </div>
                )}
              </div>

              <div className="hidden md:flex mt-6 flex-wrap justify-center gap-10 text-sky-700 text-sm font-black tracking-widest uppercase">
                 <div className="flex items-center gap-4 bg-white px-6 py-3 rounded-2xl shadow-sm border border-sky-200">
                    <div className="flex flex-col items-center gap-1">
                       <kbd className="px-3 py-1 bg-slate-100 rounded-lg border-b-4 border-slate-300 text-slate-700">W</kbd>
                       <div className="flex gap-1">
                          <kbd className="px-3 py-1 bg-slate-100 rounded-lg border-b-4 border-slate-300 text-slate-700">A</kbd>
                          <kbd className="px-3 py-1 bg-slate-100 rounded-lg border-b-4 border-slate-300 text-slate-700">S</kbd>
                          <kbd className="px-3 py-1 bg-slate-100 rounded-lg border-b-4 border-slate-300 text-slate-700">D</kbd>
                       </div>
                    </div>
                    <span>推杆 / 移动 / 滑道抗离心力</span>
                 </div>
                 <div className="flex flex-col items-center justify-center gap-2 bg-white px-8 py-3 rounded-2xl shadow-sm border border-sky-200">
                    <kbd className="px-12 py-1 bg-slate-100 rounded-lg border-b-4 border-slate-300 text-slate-700">Space</kbd>
                    <span>跳跃过坑</span>
                 </div>
              </div>
            </div>
          );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
